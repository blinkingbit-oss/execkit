name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: fmt / clippy / build / test
    runs-on: ubuntu-latest
    timeout-minutes: 25 # backstop: a hung test fails fast, never burns the 6h default
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Clippy (execkit, no default features - lean local-only build)
        run: cargo clippy -p execkit --no-default-features --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      # Includes the MCP stdio E2E (drives the built binary) and the local PTY
      # tests. ssh_smoke self-skips without EXECKIT_TEST_SSH.
      - name: Test
        run: cargo test --workspace

  ssh-e2e:
    name: SSH end-to-end (real sshd)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Start sshd (alpine container)
        run: |
          docker run -d --name sshd -p 127.0.0.1:2222:22 alpine sh -c \
            "apk add --no-cache openssh >/dev/null 2>&1 && ssh-keygen -A && \
             echo 'root:testpw' | chpasswd && \
             sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config && \
             /usr/sbin/sshd -D -e"
          for i in $(seq 1 40); do
            docker logs sshd 2>&1 | grep -q "Server listening" && { echo "sshd up"; break; }
            sleep 1
          done
          # Fail loudly if sshd never came up, instead of running against nothing.
          docker logs sshd 2>&1 | grep -q "Server listening" \
            || { echo "ERROR: sshd did not start"; docker logs sshd; exit 1; }

      - name: Run SSH smoke + drop-after-timeout regression
        env:
          EXECKIT_TEST_SSH: root:testpw@127.0.0.1:2222
        run: cargo test -p execkit --test ssh_smoke -- --nocapture

      - name: Stop sshd
        if: always()
        run: docker rm -f sshd || true

  ssh-rsa-key-e2e:
    name: SSH RSA key auth (rsa-sha2 enforced)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Generate an RSA key
        run: ssh-keygen -t rsa -b 2048 -N "" -f /tmp/ek_rsa -q

      # Server accepts the RSA key ONLY via rsa-sha2; it rejects legacy ssh-rsa
      # (SHA-1). If execkit ever signs RSA with ssh-rsa again, auth is denied and
      # the smoke test fails - a regression guard for the rsa-sha2 fix.
      - name: Start sshd (RSA key, rsa-sha2 only)
        run: |
          PUB64=$(base64 -w0 /tmp/ek_rsa.pub)
          docker run -d --name sshd_rsa -p 127.0.0.1:2223:22 alpine sh -c \
            "apk add --no-cache openssh >/dev/null 2>&1 && ssh-keygen -A && \
             mkdir -p /root/.ssh && chmod 700 /root/.ssh && \
             echo '$PUB64' | base64 -d > /root/.ssh/authorized_keys && \
             chmod 600 /root/.ssh/authorized_keys && \
             sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config && \
             echo 'PubkeyAcceptedAlgorithms rsa-sha2-256,rsa-sha2-512' >> /etc/ssh/sshd_config && \
             /usr/sbin/sshd -D -e"
          for i in $(seq 1 40); do
            docker logs sshd_rsa 2>&1 | grep -q "Server listening" && { echo "sshd up"; break; }
            sleep 1
          done
          docker logs sshd_rsa 2>&1 | grep -q "Server listening" \
            || { echo "ERROR: sshd did not start"; docker logs sshd_rsa; exit 1; }

      - name: Run RSA-key smoke (proves rsa-sha2 negotiation)
        env:
          EXECKIT_TEST_SSH_KEYSPEC: root@127.0.0.1:2223
          EXECKIT_TEST_SSH_KEY: /tmp/ek_rsa
        run: cargo test -p execkit --test ssh_smoke ssh_rsa_key -- --nocapture

      - name: Stop sshd
        if: always()
        run: docker rm -f sshd_rsa || true

  docker-e2e:
    name: Docker transport (real container)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Start a container
        run: docker run -d --name ek alpine sleep 600

      - name: Run docker_smoke against it
        env:
          EXECKIT_TEST_DOCKER: ek
        run: cargo test -p execkit --test docker_smoke -- --nocapture

      - name: Stop container
        if: always()
        run: docker rm -f ek || true

  audit:
    name: cargo audit (advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # RUSTSEC-2023-0071: Marvin timing side-channel in `rsa`, pulled
      # transitively via russh -> ssh-key -> rsa. No fixed release exists yet
      # (revisit when russh updates). Every OTHER advisory still gates CI.
      - run: cargo audit --ignore RUSTSEC-2023-0071
