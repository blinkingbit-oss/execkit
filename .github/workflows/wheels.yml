name: Wheels

# Build the execkit Python wheels and (on a release tag) publish to PyPI.
# Triggers on the SAME tag glob cargo-dist uses (release-plz pushes the tag only
# when RELEASE_PLZ_TOKEN is set; this shares that dependency). Runs in parallel
# with the cargo-dist binary release - independent artifacts, different registry.
on:
  push:
    tags: ["**[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch: # manual full-matrix build to validate before a real release

permissions:
  contents: read

jobs:
  build:
    name: wheel ${{ matrix.platform.runner }} ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    # Backstop: never let a stuck runner burn hours (an earlier macOS leg hung
    # to the 24h cap with no timeout). A real build here finishes in ~2-3 min.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64, args: "" }
          # aarch64 is cross-compiled. russh pulls `ring` (C + asm), so build
          # with zig as the cross C toolchain instead of the QEMU manylinux
          # container (which failed `cargo metadata`).
          - { runner: ubuntu-latest, target: aarch64, args: "--zig" }
          # Both macOS arches build on the Apple-silicon runner (it cross-compiles
          # x86_64 via the Xcode SDK). Avoids GitHub's slow/flaky deprecated Intel
          # (macos-13) runners, which blocked the publish gate.
          - { runner: macos-14, target: x86_64, args: "" } # Intel (cross)
          - { runner: macos-14, target: aarch64, args: "" } # Apple silicon
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # abi3-py38 -> one wheel per platform covers Python 3.8+.
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: auto
          args: --release --out dist --manifest-path crates/execkit-py/Cargo.toml ${{ matrix.platform.args }}
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/execkit-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    # Publish only on a real release tag, never on workflow_dispatch (a dispatch
    # run's ref is a branch, not refs/tags).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write # OIDC: GitHub-native Trusted Publishing, no stored token
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      # Token-free: PyPI verifies the GitHub OIDC identity (repo + workflow +
      # environment). Configure the trusted publisher once on the PyPI project.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
