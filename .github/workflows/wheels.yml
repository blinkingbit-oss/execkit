name: Wheels

# Build the execkit (SDK) + execkit-mcp (server) Python wheels and, on a release
# tag, publish both to PyPI via Trusted Publishing. Triggers on the SAME tag glob
# cargo-dist uses (release-plz pushes the tag only when RELEASE_PLZ_TOKEN is set;
# this shares that dependency). Runs in parallel with the cargo-dist binary
# release - independent artifacts, different registry.
on:
  push:
    tags: ["**[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch: # manual full-matrix build to validate before a real release

permissions:
  contents: read

# Never interrupt an in-flight publish; serialize runs for the same ref.
concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.package.name }} ${{ matrix.platform.runner }} ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    # Backstop: never let a stuck runner burn hours (an earlier macOS leg hung
    # to the 24h cap with no timeout). A real build here finishes in ~2-3 min.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # execkit = native abi3 extension; execkit-mcp = bundled server binary.
        # maturin auto-detects each from its own pyproject.toml/Cargo.toml.
        package:
          - { dir: crates/execkit-py, name: execkit-py }
          - { dir: crates/execkit-mcp, name: execkit-mcp }
        platform:
          - { runner: ubuntu-latest, target: x86_64, args: "" }
          # aarch64 is cross-compiled. russh pulls `ring` (C + asm), so build
          # with zig as the cross C toolchain instead of the QEMU manylinux
          # container (which failed `cargo metadata`).
          - { runner: ubuntu-latest, target: aarch64, args: "--zig" }
          # Both macOS arches build on the Apple-silicon runner (it cross-compiles
          # x86_64 via the Xcode SDK). Avoids GitHub's slow/flaky deprecated Intel
          # (macos-13) runners, which blocked the publish gate.
          - { runner: macos-14, target: x86_64, args: "" } # Intel (cross)
          - { runner: macos-14, target: aarch64, args: "" } # Apple silicon
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: auto
          args: --release --out dist --manifest-path ${{ matrix.package.dir }}/Cargo.toml ${{ matrix.platform.args }}
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          # Discriminate by crate dir (execkit-py / execkit-mcp); neither is a
          # glob prefix of the other, so the publish patterns below stay distinct.
          name: wheels-${{ matrix.package.name }}-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist

  # Only the SDK gets an sdist (source builds of the native extension are useful).
  # execkit-mcp ships prebuilt bin-wheels for every target platform; a source dist
  # of a binary package is low-value, and a workspace-member sdist trips PyPI's
  # PEP 639 License-File check (the crate's LICENSE lands under crates/... not the
  # dist root). So we skip it.
  sdist:
    name: sdist execkit-py
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/execkit-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-execkit-py-sdist
          path: dist

  publish:
    name: Publish ${{ matrix.package }} to PyPI
    needs: [build, sdist]
    runs-on: ubuntu-latest
    # Publish only on a real release tag, never on workflow_dispatch (a dispatch
    # run's ref is a branch, not refs/tags).
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    strategy:
      # Independent uploads: one OIDC mint per project, so a hiccup on one does
      # not abort the other.
      fail-fast: false
      matrix:
        package: [execkit-py, execkit-mcp]
    environment: pypi
    permissions:
      id-token: write # OIDC: GitHub-native Trusted Publishing, no stored token
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          # `wheels-execkit-py-*` vs `wheels-execkit-mcp-*` do not overlap.
          pattern: wheels-${{ matrix.package }}-*
          merge-multiple: true
      # Token-free: PyPI verifies the GitHub OIDC identity (repo + workflow +
      # environment) against each project's trusted publisher.
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Idempotent re-runs: if a leg flaked after some files uploaded, a
          # re-run skips the already-published files instead of hard-failing
          # (PyPI versions are immutable, so a failed re-run can't bump+retry).
          skip-existing: true
