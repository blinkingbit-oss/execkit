[workspace]
resolver = "2"
members = ["crates/execkit", "crates/execkit-mcp"]

[workspace.package]
version = "0.1.1"
edition = "2021"
rust-version = "1.85"
license = "Apache-2.0"
repository = "https://github.com/blinkingbit-oss/execkit"
homepage = "https://github.com/blinkingbit-oss/execkit"

[workspace.dependencies]
portable-pty = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
regex = "1"
