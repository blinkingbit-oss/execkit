[workspace]
resolver = "2"
members = ["crates/nexum", "crates/nexum-mcp"]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
license = "Apache-2.0"
repository = "https://github.com/nexum-rs/nexum"
homepage = "https://github.com/nexum-rs/nexum"

[workspace.dependencies]
portable-pty = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
regex = "1"
