# release-plz configuration - https://release-plz.dev/docs/config

[workspace]
# Maintain CHANGELOG.md from conventional-commit messages.
changelog_update = true
# Run a semver-compatibility check and label the Release PR accordingly.
semver_check = true
# Tags and GitHub Releases are created only for the binary crate (execkit-mcp),
# below. The execkit library still publishes to crates.io, but gets no separate
# tag/release - it ships in lockstep under the unified v{version} tag. A single
# tag means cargo-dist fires exactly once; a per-crate library tag would spawn a
# failed dist run ("this workspace doesn't have anything for dist to Release").
git_tag_enable = false
git_release_enable = false

# execkit-mcp owns the release: one unified `v{version}` tag (matching the
# existing v0.1.x scheme) plus a DRAFT GitHub Release. cargo-dist (release.yml)
# fires on that tag, uploads the prebuilt binaries to the draft, and publishes it.
[[package]]
name = "execkit-mcp"
git_tag_enable = true
git_tag_name = "v{{ version }}"
git_release_enable = true
git_release_draft = true
