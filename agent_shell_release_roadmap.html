
<style>
  h2.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .wrap { padding: 1.5rem 0; }
  .release-grid { display: flex; flex-direction: column; gap: 10px; }
  .release-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .release-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .release-header:hover { background: var(--color-background-secondary); }
  .release-badge { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .release-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
  .release-subtitle { font-size: 12px; color: var(--color-text-secondary); }
  .release-eta { font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }
  .chevron { font-size: 16px; color: var(--color-text-secondary); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }
  .release-body { display: none; border-top: 0.5px solid var(--color-border-tertiary); padding: 16px; }
  .release-body.open { display: block; }
  .feature-sections { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
  .feature-section { }
  .feature-section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-secondary); margin-bottom: 8px; }
  .feature-list { display: flex; flex-direction: column; gap: 6px; }
  .feature-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--color-text-primary); line-height: 1.5; }
  .feature-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .future-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
  .future-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; }
  .future-card-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .future-card-desc { font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; }
  .rationale { font-size: 12px; color: var(--color-text-secondary); margin-top: 12px; line-height: 1.6; padding: 10px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); border-left: 2px solid var(--color-border-secondary); }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-right: 4px; margin-top: 4px; }
</style>

<div class="wrap">
  <h2 class="sr-only">Agent shell library release roadmap — feature list by version from v0.1 to v2.x</h2>

  <div class="release-grid" id="releases"></div>
</div>

<script>
const releases = [
  {
    version: "v0.1.0",
    name: "Foundation",
    eta: "~8 weeks",
    badgeBg: "#E1F5EE", badgeColor: "#0F6E56",
    rationale: "Ship the smallest useful thing. Local PTY + SSH + structured output + MCP mode. This alone beats everything that exists today in terms of output quality.",
    sections: [
      {
        label: "Core session engine",
        dot: "#1D9E75",
        features: [
          "Persistent local PTY sessions via portable-pty",
          "SSH transport (russh + tokio, async, non-blocking)",
          "Session registry — create, exec, state, destroy",
          "Command boundary detection (OSC 133 + UUID sentinel fallback)",
        ]
      },
      {
        label: "Structured output (the differentiator)",
        dot: "#1D9E75",
        features: [
          "ExecResult: stdout, stderr split, exit_code, duration_ms, cwd",
          "ShellState delta — what changed after the command ran",
          "ANSI / escape sequence stripping pipeline",
          "Output truncation with head/tail strategy",
        ]
      },
      {
        label: "Agent interfaces",
        dot: "#1D9E75",
        features: [
          "MCP server mode — stdio JSON-RPC, works with Claude Code / Cursor out of box",
          "Python SDK — PyO3 bindings, feels like native Python",
          "Apache 2.0 license",
        ]
      }
    ]
  },
  {
    version: "v0.2.0",
    name: "Container native",
    eta: "~10 weeks post v0.1",
    badgeBg: "#E6F1FB", badgeColor: "#185FA5",
    rationale: "Most agent infrastructure runs in Docker or K8s. These need to be first-class transports, not CLI wrappers. Same ExecResult API regardless of transport.",
    sections: [
      {
        label: "New transports",
        dot: "#378ADD",
        features: [
          "Docker exec transport — Docker API directly, not shell wrapper",
          "Kubernetes exec transport — k8s API / SPDY protocol",
          "Transport trait — pluggable interface for custom transports",
        ]
      },
      {
        label: "Reliability",
        dot: "#378ADD",
        features: [
          "Connection pooling — reuse SSH channels and Docker connections",
          "Session snapshot / restore — serialize ShellState, survive reconnects",
          "Per-command and per-session configurable timeouts",
          "Retry policy hooks — agent decides what to retry",
        ]
      },
      {
        label: "SDKs",
        dot: "#378ADD",
        features: [
          "Node.js SDK — napi-rs bindings",
          "Output budget controls — max_bytes, smart ellipsis markers",
        ]
      }
    ]
  },
  {
    version: "v0.3.0",
    name: "Stream intelligence",
    eta: "~12 weeks post v0.2",
    badgeBg: "#EEEDFE", badgeColor: "#534AB7",
    rationale: "Agents increasingly need to react to output mid-flight, not just after a command finishes. And they need to interact with running processes — REPLs, servers, interactive CLIs.",
    sections: [
      {
        label: "Real-time streaming",
        dot: "#7F77DD",
        features: [
          "Streaming ExecResult — async iterator of OutputChunk events",
          "CommandStarted / CommandFinished / ProcessWaiting event types",
          "Incremental dirty-row reads — only send what changed",
          "Long-running process monitoring (tail -f, build watchers, etc.)",
        ]
      },
      {
        label: "Interactive processes",
        dot: "#7F77DD",
        features: [
          "Stdin write to running process (python REPL, vim, fzf, etc.)",
          "Process tree awareness — know what children spawned",
          "Background detached process management (start, PID, signal, status)",
          "Shell env delta tracking — diff of env vars, aliases, functions after each command",
        ]
      },
      {
        label: "Agent ergonomics",
        dot: "#7F77DD",
        features: [
          "Output semantic chunking hints — pre-annotated for LLM consumption",
          "Go SDK",
        ]
      }
    ]
  },
  {
    version: "v0.4.0",
    name: "Multi-agent coordination",
    eta: "~14 weeks post v0.3",
    badgeBg: "#FAEEDA", badgeColor: "#854F0B",
    rationale: "The shift from single-agent to multi-agent is already happening. Sub-agents need to share context, hand off work, and branch execution — all things that don't exist in any current shell tool.",
    sections: [
      {
        label: "Session branching",
        dot: "#EF9F27",
        features: [
          "Session forking — branch from a snapshot, like git for shell state",
          "Fork-and-compare — run same command in parallel branches, diff results",
          "Session merge hints — structured diff of two session states",
        ]
      },
      {
        label: "Agent collaboration",
        dot: "#EF9F27",
        features: [
          "Read-only session observation — agents watch without interfering",
          "Session ownership transfer — pass a live session between agents",
          "A2A protocol hooks — handoff-compatible session references",
          "Sub-session spawning with resource quotas (CPU, mem, I/O limits)",
        ]
      },
      {
        label: "Isolation",
        dot: "#EF9F27",
        features: [
          "Session namespacing — hard tenant isolation for multi-agent platforms",
          "Session expiry policies — TTL, idle timeout, max command count",
        ]
      }
    ]
  },
  {
    version: "v0.5.0",
    name: "Security and observability",
    eta: "~16 weeks post v0.4",
    badgeBg: "#FCEBEB", badgeColor: "#A32D2D",
    rationale: "Autonomous agents running shell commands is a real attack surface. This release makes the library safe enough for production multi-tenant deployments, not just dev machines.",
    sections: [
      {
        label: "Security layer",
        dot: "#E24B4A",
        features: [
          "Capability-based permission model — allowlist/denylist of commands, paths, env",
          "Command interceptor hooks — human-in-the-loop, pre-execution approval",
          "WASM sandbox transport — run commands in Wasmtime / WASI for isolation",
          "Dangerous pattern detector — pluggable, fires callback before exec",
        ]
      },
      {
        label: "Observability",
        dot: "#E24B4A",
        features: [
          "Structured audit log — every command, result, agent identity, timestamp",
          "OpenTelemetry spans — traces for every session and exec",
          "Rate limiting per session and per agent identity",
          "Session replay — deterministic replay of any session from audit log",
        ]
      }
    ]
  },
  {
    version: "v1.0.0",
    name: "Production stable",
    eta: "~12 weeks post v0.5",
    badgeBg: "#D3D1C7", badgeColor: "#444441",
    rationale: "API stability guarantee. Windows support. Every major agent framework has a tested integration guide. This is the 'libraries depend on it' milestone.",
    sections: [
      {
        label: "Platform completeness",
        dot: "#888780",
        features: [
          "Windows ConPTY transport — full parity with Unix PTY",
          "macOS sandbox profiles (Seatbelt) as optional transport wrapper",
          "Stable semver API — breaking changes only in major versions from here",
        ]
      },
      {
        label: "Ecosystem",
        dot: "#888780",
        features: [
          "Integration guides for LangChain, CrewAI, LlamaIndex, AutoGen, OpenHands",
          "Benchmark suite — latency, throughput, concurrent session counts",
          "Full API documentation with runnable examples",
          "MCP server mode: Streamable HTTP transport (alongside stdio)",
        ]
      }
    ]
  }
];

const futureFeatures = [
  { icon: "ti-photo", title: "Visual terminal capture", desc: "Pixel buffer + screenshot API. Computer-use agents need to see TUI apps (vim, htop, ncurses) — not just text output." },
  { icon: "ti-cpu", title: "Token-aware output", desc: "Agents declare their context window size. Library automatically adapts truncation strategy and pre-counts tokens before delivery." },
  { icon: "ti-world", title: "WASM compilation target", desc: "Compile the library itself to WASM. Run in browser, edge workers, or Cloudflare — client-side agents with no server dependency." },
  { icon: "ti-arrows-exchange", title: "Adaptive format negotiation", desc: "Agents declare capabilities on session init. Library auto-selects output format, streaming mode, and verbosity to match the consumer." },
  { icon: "ti-network", title: "Federated sessions", desc: "A single session that transparently spans multiple hosts. Agent thinks it's one machine — library handles routing, sync, and failover." },
  { icon: "ti-refresh", title: "Self-healing sessions", desc: "Automatic reconnect with full state restoration on network drop. Agent doesn't need to know the connection was ever lost." },
  { icon: "ti-brain", title: "Semantic output compression", desc: "When output exceeds budget, compress by meaning — not just truncate. Preserve the actionable signal, summarize the rest inline." },
  { icon: "ti-cpu-2", title: "Edge / IoT transport", desc: "Serial port and USB transport adapters. Agents running on embedded hardware or talking to devices over serial lines." },
];

const container = document.getElementById('releases');

releases.forEach(r => {
  const card = document.createElement('div');
  card.className = 'release-card';

  const sectionsHTML = r.sections.map(s => `
    <div class="feature-section">
      <div class="feature-section-label">${s.label}</div>
      <div class="feature-list">
        ${s.features.map(f => `
          <div class="feature-item">
            <div class="feature-dot" style="background:${s.dot}"></div>
            <span>${f}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="release-header" onclick="toggleCard(this)">
      <span class="release-badge" style="background:${r.badgeBg};color:${r.badgeColor}">${r.version}</span>
      <div style="flex:1">
        <div class="release-title">${r.name}</div>
      </div>
      <span class="release-eta">${r.eta}</span>
      <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
    </div>
    <div class="release-body">
      <div class="feature-sections">${sectionsHTML}</div>
      <div class="rationale">${r.rationale}</div>
    </div>
  `;
  container.appendChild(card);
});

const futureCard = document.createElement('div');
futureCard.className = 'release-card';
futureCard.innerHTML = `
  <div class="release-header" onclick="toggleCard(this)">
    <span class="release-badge" style="background:#FBEAF0;color:#993556">v2.x+</span>
    <div style="flex:1">
      <div class="release-title">Forward horizon</div>
    </div>
    <span class="release-eta">bets on where AI is going</span>
    <i class="ti ti-chevron-down chevron" aria-hidden="true"></i>
  </div>
  <div class="release-body">
    <div class="future-grid">
      ${futureFeatures.map(f => `
        <div class="future-card">
          <div class="future-card-title">
            <i class="ti ${f.icon}" style="font-size:15px" aria-hidden="true"></i>
            ${f.title}
          </div>
          <div class="future-card-desc">${f.desc}</div>
        </div>
      `).join('')}
    </div>
    <div class="rationale" style="margin-top:12px">These aren't speculative fluff — each maps to a real observable trend: computer-use agents (visual capture), context window economics (token-aware output), edge AI deployment (WASM + IoT), and multi-agent coordination at scale (federated sessions, semantic compression). Being ready here means agent frameworks don't outgrow the library.</div>
  </div>
`;
container.appendChild(futureCard);

function toggleCard(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

document.querySelector('.release-header').click();
</script>
